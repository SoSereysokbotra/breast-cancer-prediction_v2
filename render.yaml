services:
  - type: web
    name: breast-cancer-prediction
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: API_URL
        value: http://127.0.0.1:8000/predict
